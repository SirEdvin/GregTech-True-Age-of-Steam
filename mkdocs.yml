site_name: GregTech - True Age of Steam
site_url: https://siredvin.github.io/GregTech-True-Age-of-Steam/
site_description: Documentation for the GregTech True Age of Steam addon
repo_name: SirEdvin/GregTech-True-Age-of-Steam
repo_url: https://github.com/SirEdvin/GregTech-True-Age-of-Steam

docs_dir: docs

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: brown
      accent: orange
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: brown
      accent: orange
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy

markdown_extensions:
  - attr_list
  - md_in_html
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Multiblocks:
      - Coating Shrine: multiblocks/coating-shrine.md
      - Infernal Boiler: multiblocks/infernal-boiler.md
      - Cooling Box: multiblocks/cooling-box.md
      - Regulated Cryo Chamber: multiblocks/rcc.md
      - Concept Infusion Matrix: multiblocks/concept-infusion-matrix.md
      - Industrial gas pressurizer: multiblocks/industrial-gas-pressurizer.md
      - Spawner extraction machine: multiblocks/spawner-extraction-machine.md
  - Machines:
      - Single-Block Boilers: machines/single-block-boilers.md